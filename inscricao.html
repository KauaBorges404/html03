<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inscrição de Curso</title>
</head>
<body>
    <h1>Sistema de inscrição</h1>
    <form action="">
         <label for="">Nome:</label>
        <input type="text">
                <br><br>
        <label for="">Email:</label>
        <input type="email">
                <br><br>
        <label for="">Idade:</label>
        <input type="number">
                <br><br>
        <label for="">Data de Nascimento:</label>
        <input type="date">
                <br><br>        
        <label for="">Senha:</label>
        <input type="password">
                <br><br>
        <label for="">Turno Preferêncial:</label>
        <input type="radio" name="linguagem" value="Manhã"> <label>Manhã</label>
        <input type="radio" name="linguagem" value="Tarde"> <label>Tarde</label>
        <input type="radio" name="linguagem" value="Noite"> <label>Noite</label>
                <br><br>
        <label for="">Curso de interesse:</label>
        <input type="checkbox" name="linguagem" value="Desenvolvimento Web"> <label>Desenvolvimento Web</label>
        <input type="checkbox" name="linguagem" value="Desenvolvedor java"> <label>Desenvolvedor java</label>
        <input type="checkbox" name="linguagem" value="Python"> <label>Python</label>
                <br><br>
        <input type="submit">
    </form>
</body>
</html>
